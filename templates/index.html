<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subjectivity Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      color: #f1f5f9;
      padding: .75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -.3px; flex: 1; }
    nav { display: flex; gap: .25rem; }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: .82rem;
      padding: .3rem .7rem;
      border-radius: 5px;
      transition: background .15s, color .15s;
    }
    nav a:hover { background: #334155; color: #f1f5f9; }
    nav a.active { background: #3b82f6; color: #fff; }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      flex: 1;
    }
    @media (max-width: 820px) {
      .main { grid-template-columns: 1fr; }
    }

    .panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: .75rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      font-size: .78rem;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: #f8fafc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 1rem;
      font-size: .9rem;
      line-height: 1.65;
      font-family: inherit;
      color: #1e293b;
      background: transparent;
      min-height: 420px;
    }

    .btn-row {
      padding: .75rem 1rem;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    button {
      padding: .45rem 1.1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    #analyzeBtn { background: #3b82f6; color: #fff; }
    #clearBtn { background: #e2e8f0; color: #475569; }

    /* ── output panel ── */
    #output {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      min-height: 420px;
      line-height: 1.7;
      font-size: .9rem;
    }
    .empty-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: .9rem;
      text-align: center;
    }

    .sentence { margin-bottom: .55rem; }
    .sentence-subj {
      background: #fefce8;
      border-left: 3px solid #fbbf24;
      padding: .1rem .4rem .1rem .5rem;
      border-radius: 0 4px 4px 0;
    }

    mark { border-radius: 3px; padding: 0 2px; font-weight: 600; cursor: default; }
    mark.author_claim    { background: #ddd6fe; color: #5b21b6; }
    mark.reviewer_belief { background: #fef08a; color: #854d0e; }
    mark.positive        { background: #bbf7d0; color: #14532d; }
    mark.negative        { background: #fecaca; color: #7f1d1d; }
    mark.positioning     { background: #bae6fd; color: #0c4a6e; }
    mark.hedging         { background: #fed7aa; color: #7c2d12; }
    mark.enthusiasm      { background: #f5d0fe; color: #701a75; }

    /* ── stats bar ── */
    .stats-bar {
      padding: .65rem 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: .78rem;
      color: #475569;
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      background: #f8fafc;
    }
    .stat strong { color: #1e293b; }

    /* ── legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem .65rem;
      padding: .65rem 1rem;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .3rem;
      font-size: .75rem;
      color: #475569;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .dot.author_claim    { background: #a78bfa; }
    .dot.reviewer_belief { background: #fde047; }
    .dot.positive        { background: #4ade80; }
    .dot.negative        { background: #f87171; }
    .dot.positioning     { background: #38bdf8; }
    .dot.hedging         { background: #fb923c; }
    .dot.enthusiasm      { background: #e879f9; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #bfdbfe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Subjectivity Analyzer</h1>
  <nav>
    <a href="/" class="active">Analyze Text</a>
    <a href="/reviews">Pull Reviews</a>
  </nav>
</header>

<div class="main">
  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-header">Review text</div>
    <textarea id="reviewText" placeholder="Paste a review here…">This paper presents an interesting approach to few-shot learning. I think the contribution is novel and the authors propose a compelling framework. However, in my opinion, the evaluation is somewhat limited and the baselines are not very well chosen. The paper fails to include an ablation study, which makes it difficult to assess the individual contributions of each component. I believe the work is promising but the authors should also consider additional experiments on more diverse datasets. It would be better if the related work section were more comprehensive. The paper is well-written and the motivation is sound, though the results feel somewhat incremental compared to recent work. I would recommend acceptance with minor revisions.</textarea>
    <div class="btn-row">
      <button id="analyzeBtn" onclick="analyze()">Analyze</button>
      <button id="clearBtn" onclick="clearAll()">Clear</button>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <span>Annotated output</span>
    </div>
    <div id="output">
      <div class="empty-state">Click <strong>Analyze</strong> to highlight subjective sentences.</div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="dot author_claim"></span>Author claim</div>
      <div class="legend-item"><span class="dot reviewer_belief"></span>Reviewer belief</div>
      <div class="legend-item"><span class="dot positive"></span>Positive</div>
      <div class="legend-item"><span class="dot negative"></span>Negative</div>
      <div class="legend-item"><span class="dot positioning"></span>Positioning</div>
      <div class="legend-item"><span class="dot hedging"></span>Hedging</div>
      <div class="legend-item"><span class="dot enthusiasm"></span>Enthusiasm</div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none">
      <span>Sentences: <strong id="statTotal">—</strong></span>
      <span>Subjective: <strong id="statSubj">—</strong></span>
      <span>Subjectivity rate: <strong id="statPct">—</strong></span>
    </div>
  </div>
</div>

<script>
  function escHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function buildSentenceHtml(segment) {
    if (!segment.subjective) {
      return `<span class="sentence">${escHtml(segment.text)}</span> `;
    }
    // sort matches by start position, resolve overlaps greedily
    const matches = [...segment.matches].sort((a, b) => a.start - b.start);
    let html = "";
    let pos = 0;
    for (const m of matches) {
      if (m.start < pos) continue; // skip overlapping
      html += escHtml(segment.text.slice(pos, m.start));
      html += `<mark class="${m.category}" title="${m.category}: ${escHtml(m.text)}">${escHtml(m.text)}</mark>`;
      pos = m.end;
    }
    html += escHtml(segment.text.slice(pos));
    return `<span class="sentence sentence-subj">${html}</span> `;
  }

  async function analyze() {
    const text = document.getElementById("reviewText").value.trim();
    if (!text) return;

    document.getElementById("spinner").style.display = "block";
    document.getElementById("analyzeBtn").disabled = true;

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();

      if (data.error) {
        document.getElementById("output").innerHTML =
          `<div class="empty-state" style="color:#ef4444">${escHtml(data.error)}</div>`;
        return;
      }

      const html = data.segments.map(buildSentenceHtml).join("");
      document.getElementById("output").innerHTML = html || '<div class="empty-state">No sentences detected.</div>';

      // stats
      const s = data.stats;
      document.getElementById("statTotal").textContent = s.total;
      document.getElementById("statSubj").textContent = s.subjective;
      document.getElementById("statPct").textContent = s.pct + "%";
      document.getElementById("statsBar").style.display = "flex";
    } catch (e) {
      document.getElementById("output").innerHTML =
        `<div class="empty-state" style="color:#ef4444">Request failed: ${escHtml(String(e))}</div>`;
    } finally {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("analyzeBtn").disabled = false;
    }
  }

  function clearAll() {
    document.getElementById("reviewText").value = "";
    document.getElementById("output").innerHTML =
      '<div class="empty-state">Click <strong>Analyze</strong> to highlight subjective sentences.</div>';
    document.getElementById("statsBar").style.display = "none";
  }

  // allow Ctrl/Cmd+Enter to analyze
  document.getElementById("reviewText").addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") analyze();
  });
</script>
</body>
</html>
